# fly.toml app configuration file generated for eurovision on 2026-05-16T22:10:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eurovision'
primary_region = 'fra'

[build]

[env]
  DATABASE_PATH = '/data/eurovision-ranker.sqlite'
  NODE_ENV = 'production'

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
